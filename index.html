<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Tools</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css"> <!-- 해당 CSS 파일로 출력화면 보정 -->
    <script src="https://cdn.jsdelivr.net/npm/diff/dist/diff.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html.min.js"></script>
    <script src="https://kit.fontawesome.com/81444ac193.js" crossorigin="anonymous"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { display: flex; gap: 20px; margin-bottom: 20px; }
        textarea { width: 100%; height: 200px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; cursor: pointer; font-size: 16px; font-weight: bold; border-radius: 12px; transition: background-color 0.3s, transform 0.1s; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        button:hover {
            background-color: #0056b3;
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }
        button:active {
            transform: scale(0.98);
        }
        #result { margin-top: 20px; border: 1px solid #ccc; min-height: 200px; }
    </style>
</head>
<body>

    <h2><i class="fa-brands fa-bilibili"></i> 마이어 알고리즘 레츠고</h2>
    
    <div class="container">
        <div style="flex:1">
            <label>원본</label>
            <textarea id="original" placeholder="원본 텍스트를 입력하세요..."></textarea>
        </div>
        <div style="flex:1">
            <label>비교본</label>
            <textarea id="modified" placeholder="수정된 텍스트를 입력하세요..."></textarea>
        </div>
    </div>

    <button onclick="compareText()"><i class="fa-brands fa-angellist"></i></button>

    <div id="result"></div>

    <script>
        function compareText() {
            const one = document.getElementById('original').value;
            const other = document.getElementById('modified').value;
            
            // 1. 차이점 계산 (Unified Diff 형식 생성)
            const diffString = Diff.createTwoFilesPatch("원본", "비교본", one, other);
            
            // 2. 시각화 출력
            const targetElement = document.getElementById('result');
            
            // Diff2Html 라이브러리 호출 (전역 객체 확인)
            const diffHtml = Diff2Html.html(diffString, {
                drawFileList: false,
                matching: 'lines', /* matching: 'lines' 옵션은 줄 단위로 변경사항 묶어서 보여줌 */
                outputFormat: 'side-by-side' /* 결과를 좌/우 두칸으로 나누어 배치 */
            });
            
            // const diffHtml = Diff2Html.html(diff, configuration);
            targetElement.innerHTML = diffHtml;
        }
    </script>
</body>
</html>
